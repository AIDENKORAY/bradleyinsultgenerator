<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Insult Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f0f0f, #1f1f1f);
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  width: 100%;
  text-align: center;
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  margin-top: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
}

#insult {
  margin: 20px 0;
  font-size: 1.4rem;
  min-height: 60px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  font-size: 1rem;
  border: none;
  border-radius: 10px;
  background: crimson;
  color: white;
  cursor: pointer;
}

button:hover {
  background: darkred;
}

.secondary {
  background: #333;
}

.secondary:hover {
  background: #555;
}

.toggle {
  margin-top: 10px;
}

/* 📱 Mobile tweaks */
@media (max-width: 500px) {
  h1 {
    font-size: 1.8rem;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>AI Insult Generator 😈</h1>

  <div class="card">

    <input id="nameInput" placeholder="Who are we insulting?" />

    <select id="styleSelect">
      <option value="">General</option>
      <option value="sarcastic">Sarcastic</option>
      <option value="intelligent">Smart / witty</option>
      <option value="gaming">Gaming roast</option>
      <option value="school">School roast</option>
      <option value="friendly">Playful</option>
    </select>

    <div class="toggle">
      <label>
        <input type="checkbox" id="savageMode">
        Savage Mode 🔥
      </label>
    </div>

    <div id="insult">Click generate… if you dare.</div>

    <button onclick="generateInsult()">Generate</button>
    <button class="secondary" onclick="copyInsult()">Copy</button>

  </div>
</div>

<script>
async function generateInsult() {
  const name = document.getElementById("nameInput").value.trim();
  const savage = document.getElementById("savageMode").checked;
  const style = document.getElementById("styleSelect").value;

  document.getElementById("insult").innerText = "Cooking something evil...";

  try {
    const res = await fetch("/api/insult", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, savage, style })
    });

    const data = await res.json();
    document.getElementById("insult").innerText = data.insult;

    localStorage.setItem("lastInsult", data.insult);

  } catch {
    document.getElementById("insult").innerText = "Something broke 😭";
  }
}

function copyInsult() {
  const text = document.getElementById("insult").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// Load last insult
window.onload = () => {
  const saved = localStorage.getItem("lastInsult");
  if (saved) document.getElementById("insult").innerText = saved;
};
</script>

</body>
</html>
